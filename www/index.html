<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chore Schedule Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="container">
  <h1>Chore Schedule Generator</h1>

  <div class="card">
    <h2>Settings</h2>
    <div class="form-row">
      <div class="field">
        <label for="days">Number of days</label>
        <input type="number" id="days" min="1" max="365" value="7" />
      </div>
    </div>

    <!-- Workers -->
    <h2>Workers</h2>
    <div class="form-row">
      <div class="field">
        <label for="num-people">Number of workers</label>
        <input type="number" id="num-people" min="1" value="20" />
      </div>
    </div>
    <div class="names-toggle-row">
      <label class="toggle-label">
        <input type="checkbox" id="custom-names-toggle" />
        Specify worker names
      </label>
    </div>
    <div id="names-field" style="display:none">
      <label for="names-input" class="names-label">Worker names (one per line)</label>
      <textarea id="names-input" rows="6" spellcheck="false" placeholder="One name per line"></textarea>
    </div>

    <!-- Supervisors -->
    <h2>Supervisors</h2>
    <div class="names-toggle-row">
      <label class="toggle-label">
        <input type="checkbox" id="supervisors-toggle" />
        Enable supervisors (one per chore per day, separate pool)
      </label>
    </div>
    <div id="supervisor-settings" style="display:none">
      <div class="form-row">
        <div class="field">
          <label for="num-supervisors">Number of supervisors</label>
          <input type="number" id="num-supervisors" min="1" value="5" />
        </div>
      </div>
      <div class="names-toggle-row">
        <label class="toggle-label">
          <input type="checkbox" id="custom-sup-names-toggle" />
          Specify supervisor names
        </label>
      </div>
      <div id="sup-names-field" style="display:none">
        <label for="sup-names-input" class="names-label">Supervisor names (one per line)</label>
        <textarea id="sup-names-input" rows="4" spellcheck="false" placeholder="One name per line"></textarea>
      </div>
    </div>

    <h2>Chores</h2>
    <div id="chore-list"></div>
    <button class="btn btn-add" id="add-chore-btn">+ Add chore</button>
  </div>

  <button class="btn btn-generate" id="generate-btn">Generate Schedule</button>

  <div id="error-box"></div>

  <div id="output">
    <div class="output-toolbar">
      <button class="btn btn-export" id="export-btn">Export CSV</button>
    </div>
    <div class="card">
      <h2>Schedule</h2>
      <div id="schedule-container"></div>
    </div>
    <div class="card">
      <h2>Summary</h2>
      <div id="summary-container"></div>
    </div>
  </div>
</div>

<script type="module" src="index.js"></script>
</body>
</html>
